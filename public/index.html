<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10x Parallel Electron Compiler</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a; color: #f8fafc;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .container {
            background: #1e293b; padding: 2.5rem; border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); text-align: center; width: 420px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #38bdf8; }
        .drop-zone {
            border: 2px dashed #475569; padding: 2rem; border-radius: 8px; cursor: pointer; transition: border 0.2s;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: #38bdf8; background: #334155; }
        input[type="file"] { display: none; }
        .progress-container { margin-top: 1.5rem; display: none; text-align: left; }
        progress { width: 100%; height: 10px; border-radius: 5px; accent-color: #10b981; margin-top: 4px; }
        .status { margin-top: 0.5rem; font-size: 0.875rem; color: #94a3b8; font-weight: 500; }
        .speed-badge {
            display: inline-block; background: #0369a1; color: #e0f2fe; 
            font-size: 11px; font-weight: bold; padding: 2px 8px; 
            border-radius: 12px; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Electron Compiler <span class="speed-badge">10x Pipeline</span></h1>
    <div class="drop-zone" id="dropZone">
        <p>Drag & Drop project <b>.zip</b> here</p>
        <input type="file" id="fileInput" accept=".zip">
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="status" id="statusText">Ready</div>
        <progress id="progressBar" value="0" max="100"></progress>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) startWorkflow(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) startWorkflow(fileInput.files[0]);
    });

    async function startWorkflow(file) {
        progressContainer.style.display = 'block';
        statusText.innerText = "Uploading source archive...";
        progressBar.removeAttribute('value');

        const formData = new FormData();
        formData.append('codezip', file);

        try {
            // 1. Send to server for processing
            const response = await fetch('/compile', { method: 'POST', body: formData });
            if (!response.ok) throw new Error("Compilation server side failed.");
            
            const { buildId, totalBytes } = await response.json();
            
            // 2. Multi-threaded Range Download Engine (Set to 10 channels)
            statusText.innerText = "Downloading over 10 parallel channels...";
            const compiledBlob = await downloadFileInParallel(buildId, totalBytes, 10);
            
            // 3. Mount assembly to browser frame and click
            statusText.innerText = "Assembling blocks! Saving file...";
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(compiledBlob);
            link.download = `compiled-windows-app.zip`;
            link.click();

            // 4. Send clear flag to empty Server RAM cache
            fetch(`/download/${buildId}`, { method: 'DELETE' });

        } catch (err) {
            statusText.innerText = `Error: ${err.message}`;
            progressBar.value = 0;
        }
    }

    // High-Concurrency Parallel Chunk Extractor
    async function downloadFileInParallel(buildId, totalBytes, concurrency = 10) {
        const chunkSize = Math.ceil(totalBytes / concurrency);
        const promises = [];
        let completedBytes = 0;

        progressBar.max = totalBytes;
        progressBar.value = 0;

        for (let i = 0; i < concurrency; i++) {
            const start = i * chunkSize;
            const end = Math.min(start + chunkSize - 1, totalBytes - 1);

            // Skip invalid range blocks if file size is smaller than concurrency factor
            if (start >= totalBytes) continue;

            promises.push(
                fetch(`/download/${buildId}`, {
                    headers: { 'Range': `bytes=${start}-${end}` }
                }).then(async (res) => {
                    if (!res.ok) throw new Error(`Channel ${i} dropped payload connectivity.`);
                    const reader = res.body.getReader();
                    const chunks = [];
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        completedBytes += value.length;
                        progressBar.value = completedBytes; // Merged progress update ticking
                    }
                    
                    return { index: i, blob: new Blob(chunks) };
                })
            );
        }

        const results = await Promise.all(promises);
        
        // Critically important: Sort the blocks sequentially by index before joining them together!
        results.sort((a, b) => a.index - b.index);
        return new Blob(results.map(r => r.blob), { type: 'application/zip' });
    }
</script>
</body>
</html>
