<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Electron Compiler</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a; color: #f8fafc;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .container {
            background: #1e293b; padding: 2.5rem; border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); text-align: center; width: 440px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #38bdf8; }
        .drop-zone {
            border: 2px dashed #475569; padding: 2rem; border-radius: 8px; cursor: pointer; transition: border 0.2s;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: #38bdf8; background: #334155; }
        input[type="file"] { display: none; }
        .progress-container { margin-top: 1.5rem; display: none; text-align: left; }
        progress { width: 100%; height: 12px; border-radius: 6px; accent-color: #10b981; margin-top: 6px; }
        .status { margin-top: 0.5rem; font-size: 0.9rem; color: #38bdf8; font-weight: 500; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Electron Compiler Dashboard</h1>
    <div class="drop-zone" id="dropZone">
        <p>Drag & Drop project <b>.zip</b> here</p>
        <input type="file" id="fileInput" accept=".zip">
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="status" id="statusText">Awaiting file...</div>
        <progress id="progressBar" value="0" max="100"></progress>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) startWorkflow(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) startWorkflow(fileInput.files[0]);
    });

    function startWorkflow(file) {
        progressContainer.style.display = 'block';
        statusText.innerText = "Initializing pipe upload: 0%";
        progressBar.value = 0;

        const xhr = new XMLHttpRequest();
        const formData = new FormData();
        formData.append('codezip', file);

        // Track real-time network upload status
        xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                progressBar.value = percent * 0.95; // Leave a tiny bit of visual space for server processing step
                statusText.innerText = `Uploading source files to server: ${percent}%`;
            }
        });

        xhr.onload = async function () {
            if (xhr.status === 200) {
                const { buildId, totalBytes } = JSON.parse(xhr.responseText);
                
                // Hook into live Server-Sent Events logging pipeline
                const eventSource = new EventSource(`/status/${buildId}`);
                
                eventSource.onmessage = async function(event) {
                    const data = JSON.parse(event.data);
                    statusText.innerText = `[Server]: ${data.message}`;
                    if (data.progress !== null) {
                        progressBar.value = data.progress;
                    }

                    // Once server is fully ready, download with 10 streams
                    if (data.progress === 100) {
                        eventSource.close();
                        statusText.innerText = "Triggering high-speed 10-channel download pipeline...";
                        
                        const compiledBlob = await downloadFileInParallel(buildId, totalBytes, 10);
                        
                        statusText.innerText = "Assembling streams! Saving executable package...";
                        const link = document.createElement('a');
                        link.href = window.URL.createObjectURL(compiledBlob);
                        link.download = `compiled-windows-app.zip`;
                        link.click();

                        fetch(`/download/${buildId}`, { method: 'DELETE' });
                    }
                };
            } else {
                statusText.innerText = "Error: Upload or compilation handshake rejected.";
                progressBar.value = 0;
            }
        };

        xhr.open('POST', '/compile');
        xhr.send(formData);
    }

    async function downloadFileInParallel(buildId, totalBytes, concurrency = 10) {
        const chunkSize = Math.ceil(totalBytes / concurrency);
        const promises = [];
        let completedBytes = 0;

        progressBar.max = totalBytes;
        progressBar.value = 0;

        for (let i = 0; i < concurrency; i++) {
            const start = i * chunkSize;
            const end = Math.min(start + chunkSize - 1, totalBytes - 1);
            if (start >= totalBytes) continue;

            promises.push(
                fetch(`/download/${buildId}`, { headers: { 'Range': `bytes=${start}-${end}` } })
                .then(async (res) => {
                    const reader = res.body.getReader();
                    const chunks = [];
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        completedBytes += value.length;
                        progressBar.value = completedBytes;
                        statusText.innerText = `Downloading: ${Math.round((completedBytes / totalBytes) * 100)}%`;
                    }
                    return { index: i, blob: new Blob(chunks) };
                })
            );
        }

        const results = await Promise.all(promises);
        results.sort((a, b) => a.index - b.index);
        return new Blob(results.map(r => r.blob), { type: 'application/zip' });
    }
</script>
</body>
</html>
