<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electron Cloud Compiler</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 400px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #38bdf8; }
        .drop-zone {
            border: 2px dashed #475569;
            padding: 2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: border 0.2s;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: #38bdf8; background: #334155; }
        input[type="file"] { display: none; }
        .progress-container { margin-top: 1.5rem; display: none; }
        progress { width: 100%; height: 10px; border-radius: 5px; accent-color: #38bdf8; }
        .status { margin-top: 0.5rem; font-size: 0.875rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Electron Compiler</h1>
    <div class="drop-zone" id="dropZone">
        <p>Drag & Drop your project <b>.zip</b> here</p>
        <p style="font-size: 12px; color: #64748b;">(Must contain package.json at root)</p>
        <input type="file" id="fileInput" accept=".zip">
    </div>

    <div class="progress-container" id="progressContainer">
        <progress id="progressBar" value="0" max="100"></progress>
        <div class="status" id="statusText">Uploading...</div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');

    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) uploadFile(fileInput.files[0]);
    });

    function uploadFile(file) {
        const xhr = new XMLHttpRequest();
        const formData = new FormData();
        formData.append('codezip', file);

        progressContainer.style.display = 'block';
        statusText.innerText = "Uploading to builder server...";

        // Real-time Upload Progress listener
        xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                progressBar.value = percent;
                statusText.innerText = `Uploading: ${percent}%`;
            }
        });

        xhr.responseType = 'blob';
        
        xhr.onload = function () {
            if (xhr.status === 200) {
                statusText.innerText = "Build complete! Downloading executable...";
                
                // Read filename from server response headers if available
                const disposition = xhr.getResponseHeader('Content-Disposition');
                let filename = 'electron-app.zip';
                if (disposition && disposition.indexOf('attachment') !== -1) {
                    const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    const matches = filenameRegex.exec(disposition);
                    if (matches != null && matches[1]) filename = matches[1].replace(/['"]/g, '');
                }

                // Download the compiled zip
                const blob = xhr.response;
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = filename;
                link.click();
            } else {
                statusText.innerText = "Build or Upload failed.";
            }
        };

        xhr.open('POST', '/compile');
        xhr.send(formData);
    }
</script>
</body>
</html>
